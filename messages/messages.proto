// This file defines the data contracts (messages) for your Axiom package.
// Every node's --input and --output refers to a message defined here.
//
// Run `axiom create message <Name>` to scaffold a new message below.
// Run `axiom generate` to compile these definitions into language bindings in gen/.
//
// DOCUMENTATION
//   Comments written directly above a message or field declaration are extracted
//   automatically at publish time and shown in the Axiom registry as documentation.
//   Write your descriptions there — no separate doc files needed.
//
//   Leading comment  (no blank line before the declaration) → registry description ✓
//   Detached comment (blank line before the declaration)    → ignored by registry  ✗
//
// This file is yours to edit. Axiom only appends new message blocks — it never
// overwrites or removes content you have written.

syntax = "proto3";

package christiangeorgelucas.office_tools;

option java_package = "gen";
option java_outer_classname = "Messages";

// The canonical input envelope every node in this package accepts: an Office
// document (.xlsx/.xls spreadsheet or .docx/.doc word document) as raw bytes,
// or a URL to fetch it from when data is empty. Password is optional and only
// used for encrypted OOXML files POI can decrypt.
message OfficeFile {
  // Raw file bytes. Leave empty and set url instead to fetch remotely.
  bytes data = 1;
  // Convenience: fetch the file from this URL when data is empty.
  string url = 2;
  // Optional password for an encrypted OOXML (.xlsx/.docx) file.
  string password = 3;
}

// One spreadsheet cell's typed value plus (when applicable) its formula.
message Cell {
  // 0-based row index.
  int32 row = 1;
  // 0-based column index.
  int32 col = 2;
  // A1-style reference for this cell, e.g. "B3".
  string ref = 3;
  // The cell's POI type: STRING, NUMERIC, BOOLEAN, FORMULA, BLANK, ERROR.
  string type = 4;
  // String value (present for STRING cells, and for FORMULA cells whose
  // cached/evaluated result is a string).
  string string_value = 5;
  // Numeric value (present for NUMERIC cells, and for FORMULA cells whose
  // cached/evaluated result is numeric). Excel date-formatted cells are
  // reported as their raw numeric serial value here; is_date flags them.
  double number_value = 6;
  // Boolean value (present for BOOLEAN cells, and boolean FORMULA results).
  bool bool_value = 7;
  // True when the cell's numeric value is displayed with a date/time format.
  bool is_date = 8;
  // The formula text (without a leading "="), present only for FORMULA cells.
  string formula = 9;
  // Human-formatted display string per the cell's number/date format.
  string formatted_value = 10;
  // Set when type is ERROR: the Excel error code text (e.g. "#DIV/0!").
  string error_value = 11;
}

// One row of cells, used inside a grid result.
message Row {
  repeated Cell cells = 1;
}

// Metadata + row/col shape for one sheet in a workbook.
message SheetInfo {
  // 0-based sheet index.
  int32 index = 1;
  string name = 2;
  // Number of rows POI reports as used (last row index + 1); 0 if empty.
  int32 row_count = 3;
  // Widest row's used column count across the sheet.
  int32 col_count = 4;
  bool is_hidden = 5;
}

// Output of ListSheets.
message SheetsResult {
  repeated SheetInfo sheets = 1;
  int32 sheet_count = 2;
  // Index of the workbook's active (currently selected) sheet.
  int32 active_sheet_index = 3;
  // Structured error message; empty on success. Set instead of raising on
  // malformed input, an unreadable file, or a bound being exceeded.
  string error = 4;
}

// Input to ReadSheet: read an entire sheet's used cell grid, bounded.
message ReadSheetInput {
  OfficeFile file = 1;
  // Sheet to read by name (checked first if non-empty) or by 0-based index.
  string sheet_name = 2;
  int32 sheet_index = 3;
  // Row/column caps to bound response size. 0 means "use the default cap"
  // (10,000 rows / 1,000 columns); the result's truncated flag reports if
  // the sheet's real extent exceeded the cap actually applied.
  int32 max_rows = 4;
  int32 max_cols = 5;
}

// Input to ReadRange: read one explicit A1-notation range, e.g. "A1:C10".
message ReadRangeInput {
  OfficeFile file = 1;
  string sheet_name = 2;
  int32 sheet_index = 3;
  // A1-notation range, e.g. "B2:D5" or a single cell "B2".
  string range_ref = 4;
}

// A bounded grid of cells — the common output shape for ReadSheet/ReadRange.
message GridResult {
  repeated Row rows = 1;
  int32 row_count = 2;
  int32 col_count = 3;
  string sheet_name = 4;
  // True when the returned grid was cut short by the row/col cap.
  bool truncated = 5;
  // Structured error message; empty on success.
  string error = 6;
}

// Input to ReadCell: look up one cell by A1 reference.
message ReadCellInput {
  OfficeFile file = 1;
  string sheet_name = 2;
  int32 sheet_index = 3;
  // A1-notation cell reference, e.g. "C7".
  string cell_ref = 4;
}

// Output of ReadCell.
message CellResult {
  Cell cell = 1;
  // False when the reference points past the sheet's used range (cell has
  // no value); cell is still returned with type BLANK in that case.
  bool found = 2;
  // Structured error message; empty on success.
  string error = 3;
}

// One workbook-level defined (named) range or named constant.
message DefinedName {
  string name = 1;
  // The formula/reference this name resolves to, e.g. "Sheet1!$A$1:$A$10".
  string refers_to = 2;
  // -1 for a workbook-scoped name; otherwise the 0-based sheet it is scoped to.
  int32 sheet_index = 3;
  bool is_function_name = 4;
}

// Output of ListDefinedNames.
message DefinedNamesResult {
  repeated DefinedName names = 1;
  int32 count = 2;
  // Structured error message; empty on success.
  string error = 3;
}

// Output of ExtractSpreadsheetText / ExtractDocText.
message TextResult {
  string text = 1;
  // ExtractSpreadsheetText: number of sheets concatenated.
  // ExtractDocText: number of paragraphs concatenated.
  int32 unit_count = 2;
  // Structured error message; empty on success.
  string error = 3;
  // True when extraction was cut short by a sheet/row/column/size bound.
  bool truncated = 4;
}

// One paragraph of a Word document, with its style.
message Paragraph {
  int32 index = 1;
  string text = 2;
  // The paragraph's named style (e.g. "Heading1", "Normal"); empty if unset.
  string style_name = 3;
  // True when the style/outline level marks this paragraph as a heading.
  bool is_heading = 4;
  // Heading level (1-based) when is_heading; 0 otherwise.
  int32 heading_level = 5;
}

// Output of ExtractParagraphs (.docx only — see node description).
message ParagraphsResult {
  repeated Paragraph paragraphs = 1;
  int32 count = 2;
  // Structured error message; empty on success.
  string error = 3;
}

// One row of a Word document table.
message TableRow {
  repeated string cells = 1;
}

// One table extracted from a Word document.
message DocTable {
  int32 index = 1;
  repeated TableRow rows = 2;
  int32 row_count = 3;
}

// Output of ExtractDocTables (.docx only — see node description).
message TablesResult {
  repeated DocTable tables = 1;
  int32 table_count = 2;
  // Structured error message; empty on success.
  string error = 3;
}

// Output of GetProperties — core document metadata, common across
// .xlsx/.xls/.docx/.doc (POI exposes the same property set for OOXML core
// properties and legacy OLE2 SummaryInformation, mapped onto one shape here).
message PropertiesResult {
  string title = 1;
  string subject = 2;
  string author = 3;
  string keywords = 4;
  string comments = 5;
  string category = 6;
  // ISO-8601 UTC timestamp, or empty when the document doesn't set it.
  string created = 7;
  string modified = 8;
  string last_modified_by = 9;
  string revision = 10;
  string application = 11;
  string template = 12;
  // Detected format: "xlsx", "xls", "docx", or "doc".
  string format = 13;
  // Structured error message; empty on success.
  string error = 14;
}

// Output of DetectFormat.
message FormatResult {
  // "xlsx", "xls", "docx", "doc", or "unknown".
  string format = 1;
  string mime_type = 2;
  // True for the two modern zip-based Office Open XML formats (xlsx/docx).
  bool is_ooxml = 3;
  // True for the two legacy OLE2 compound-binary formats (xls/doc).
  bool is_legacy_binary = 4;
  // Structured error message; empty on success. Unrecognized input is not
  // an error — it returns format="unknown" with error empty.
  string error = 5;
}
