name: christiangeorgelucas/office-tools
version: 0.1.0
language: java
nodes:
    - name: DetectFormat
      input: OfficeFile
      output: FormatResult
    - name: GetProperties
      input: OfficeFile
      output: PropertiesResult
    - name: ListSheets
      input: OfficeFile
      output: SheetsResult
    - name: ReadSheet
      input: ReadSheetInput
      output: GridResult
    - name: ReadRange
      input: ReadRangeInput
      output: GridResult
    - name: ReadCell
      input: ReadCellInput
      output: CellResult
    - name: ListDefinedNames
      input: OfficeFile
      output: DefinedNamesResult
    - name: ExtractSpreadsheetText
      input: OfficeFile
      output: TextResult
    - name: ExtractDocText
      input: OfficeFile
      output: TextResult
    - name: ExtractParagraphs
      input: OfficeFile
      output: ParagraphsResult
    - name: ExtractDocTables
      input: OfficeFile
      output: TablesResult

build:
    maven_deps:
        - org.apache.poi:poi:5.5.1
        - org.apache.poi:poi-ooxml:5.5.1
        - org.apache.poi:poi-scratchpad:5.5.1
